<!DOCTYPE html>

<html data-theme="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>지리산 등산 플레이북 — 초·중·고급 3코스</title>
<meta name="description" content="대한민국 최고의 명산 중 하나인 지리산 국립공원 가이드. 초급 고도 프로파일, 고급 고도 프로파일 코스의 상세 경로, 실사 지도 및 팁을 제공합니다.">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&amp;f[]=cabinet-grotesk@400,500,700,800&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/design-system.css">
<style>
/* COURSE SELECTOR */
.course-selector {
  display: flex;
  gap: var(--space-3);
  justify-content: center;
  flex-wrap: wrap;
  margin-top: var(--space-6);
  margin-bottom: var(--space-8);
}
.course-btn {
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-full);
  font-weight: 700;
  font-size: var(--text-sm);
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all var(--transition);
}
.course-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.course-btn.active.beginner, .course-btn.active-beginner {
  background: var(--success-highlight);
  color: var(--success);
  border-color: var(--success);
}
.course-btn.active.intermediate, .course-btn.active-intermediate {
  background: var(--color-gold-highlight);
  color: var(--color-gold);
  border-color: var(--color-gold);
}
.course-btn.active.advanced, .course-btn.active-advanced {
  background: var(--warning-highlight);
  color: var(--warning);
  border-color: var(--warning);
}

.intermediate .section-title-icon{background:var(--color-gold-highlight);}
.advanced .section-title-icon{background:var(--color-warning-highlight);}

/* ACCORDION */
.accordion{display:flex;flex-direction:column;gap:var(--space-3);margin-bottom:var(--space-8);}
.acc-item{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;}
.acc-header{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-4) var(--space-5);cursor:pointer;user-select:none;width:100%;text-align:left;}
.acc-header:hover{background:var(--color-surface-offset);}
.acc-num{width:28px;height:28px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:var(--text-xs);font-weight:700;flex-shrink:0;}
.beginner .acc-num{background:var(--color-success-highlight);color:var(--color-success);}
.intermediate .acc-num{background:var(--color-gold-highlight);color:var(--color-gold);}
.advanced .acc-num{background:var(--color-warning-highlight);color:var(--color-warning);}
.acc-title-wrap{flex:1;}
.acc-title{font-weight:700;font-size:var(--text-base);line-height:1.3;}
.acc-meta{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;}
.acc-chevron{color:var(--color-text-faint);transition:transform var(--transition);flex-shrink:0;}
.acc-item.open .acc-chevron{transform:rotate(180deg);}
.acc-body{display:none;padding:0 var(--space-5) var(--space-5);border-top:1px solid var(--color-divider);}
.acc-item.open .acc-body{display:block;}
.acc-desc{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.7;margin-bottom:var(--space-4);}

/* DIFF BAR */
.diff-bar-wrap{margin-bottom:var(--space-4);}
.diff-label{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-1);}
.diff-bar-bg{height:6px;background:var(--color-surface-dynamic);border-radius:var(--radius-full);overflow:hidden;}
.diff-bar-fill{height:100%;border-radius:var(--radius-full);}
.diff-easy .diff-bar-fill{background:var(--color-success);}
.diff-medium .diff-bar-fill{background:var(--color-gold);}
.diff-hard .diff-bar-fill{background:var(--color-warning);}
.diff-expert .diff-bar-fill{background:var(--color-error);}

/* TIP / WARN BOX */
.tip-box{background:var(--color-primary-highlight);border-left:3px solid var(--color-primary);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:var(--space-3) var(--space-4);font-size:var(--text-sm);color:var(--color-primary);margin-bottom:var(--space-3);line-height:1.6;}
.warn-box{background:var(--color-warning-highlight);border-left:3px solid var(--color-warning);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:var(--space-3) var(--space-4);font-size:var(--text-sm);color:var(--color-warning);margin-bottom:var(--space-3);line-height:1.6;}

/* CHECKPOINT TABLE */
.cp-table-wrap{overflow-x:auto;margin-bottom:var(--space-8);}
.cp-table{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
.cp-table th{text-align:left;font-weight:700;font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.06em;color:var(--color-text-muted);padding:var(--space-2) var(--space-4);border-bottom:2px solid var(--color-divider);white-space:nowrap;}
.cp-table td{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-divider);vertical-align:middle;}
.cp-table tr:last-child td{border-bottom:none;}
.cp-table tr:hover td{background:var(--color-surface-offset);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;}
.badge-summit{background:var(--color-warning-highlight);color:var(--color-warning);}
.badge-shelter{background:var(--color-primary-highlight);color:var(--color-primary);}
.badge-temple{background:var(--color-success-highlight);color:var(--color-success);}
.badge-trailhead{background:var(--color-surface-dynamic);color:var(--color-text-muted);}
.badge-landmark{background:var(--color-gold-highlight);color:var(--color-gold);}

/* MAP SVG */
.map-wrap{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-6);margin-bottom:var(--space-8);}
.map-wrap h3{font-family:var(--font-display);font-weight:700;font-size:var(--text-lg);margin-bottom:var(--space-4);}
.map-svg{width:100%;height:auto;max-height:520px;}

/* TIPS GRID */
.tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-4);margin-bottom:var(--space-8);}
.tip-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-5);}
.tip-card-icon{font-size:1.5rem;margin-bottom:var(--space-3);}
.tip-card h4{font-weight:700;margin-bottom:var(--space-2);}
.tip-card ul{list-style:none;display:flex;flex-direction:column;gap:var(--space-1);}
.tip-card ul li{font-size:var(--text-sm);color:var(--color-text-muted);padding-left:var(--space-4);position:relative;}
.tip-card ul li::before{content:"·";position:absolute;left:var(--space-2);color:var(--color-text-faint);}

/* RESPONSIVE */
@media(max-width:640px){
  .site-header{padding:var(--space-3) var(--space-4);}
  .main{padding:var(--space-6) var(--space-4);}
  .hero{padding:var(--space-8) var(--space-4) var(--space-6);}
  .tab-bar{padding:0 var(--space-4);}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .course-selector{gap:var(--space-2);}
  .course-btn{padding:var(--space-2) var(--space-4);font-size:var(--text-xs);}
}

/* --- UPGRADE: HERO BLEED, GALLERY, LIGHTBOX, CREDITS --- */
.hero-bleed {
  position: relative;
  width: 100%;
  min-height: clamp(340px, 45vh, 520px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: var(--space-12, 3rem) var(--space-6, 1.5rem);
  overflow: hidden;
  border-bottom: 1px solid var(--color-divider, var(--divider, var(--div, #dcd9d5)));
  background-color: var(--color-bg, var(--bg, #f7f6f2));
  
  --hero-overlay-top: rgba(247, 246, 242, 0.35);
  --hero-overlay-bottom: rgba(247, 246, 242, 0.90);
  --hero-text: var(--color-text, var(--text, var(--txt, #28251d)));
  --hero-text-muted: var(--color-text-muted, var(--muted, #7a7974));
  --hero-badge-bg: var(--color-primary-highlight, var(--primary-highlight, #cedcd8));
  --hero-badge-color: var(--color-primary, var(--primary, #01696f));
}

@supports (background-color: color-mix(in srgb, red, blue)) {
  .hero-bleed {
    --hero-overlay-top: color-mix(in srgb, var(--color-bg, var(--bg, #f7f6f2)) 35%, transparent);
    --hero-overlay-bottom: color-mix(in srgb, var(--color-bg, var(--bg, #f7f6f2)) 90%, transparent);
  }
}

[data-theme="dark"] .hero-bleed {
  --hero-overlay-top: rgba(15, 14, 13, 0.35);
  --hero-overlay-bottom: rgba(15, 14, 13, 0.96);
  --hero-text: var(--color-text, var(--text, var(--txt, #cdccca)));
  --hero-text-muted: var(--color-text-muted, var(--muted, #797876));
  --hero-badge-bg: var(--color-primary-highlight, var(--primary-highlight, #1e3234));
  --hero-badge-color: var(--color-primary, var(--primary, #4f98a3));
}

@supports (background-color: color-mix(in srgb, red, blue)) {
  [data-theme="dark"] .hero-bleed {
    --hero-overlay-top: color-mix(in srgb, var(--color-bg, var(--bg, #0f0e0d)) 35%, transparent);
    --hero-overlay-bottom: color-mix(in srgb, var(--color-bg, var(--bg, #0f0e0d)) 96%, transparent);
  }
}

.hero-bleed .hero-picture {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.hero-bleed .hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 35%;
}

.hero-bleed .hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  background: linear-gradient(180deg, var(--hero-overlay-top) 0%, var(--hero-overlay-bottom) 100%);
  pointer-events: none;
}

.hero-bleed .hero-content {
  position: relative;
  z-index: 3;
  max-width: 65ch;
  margin: 0 auto;
  pointer-events: auto;
}

.hero-bleed h1 {
  color: var(--hero-text);
  font-family: var(--font-display, sans-serif);
  font-size: var(--text-2xl, 2.5rem);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: var(--space-4, 1rem);
  text-shadow: 0 1px 2px var(--color-bg, var(--bg, #f7f6f2));
}

[data-theme="dark"] .hero-bleed h1 {
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.hero-bleed p {
  color: var(--hero-text-muted);
  font-size: var(--text-base, 1.1rem);
  line-height: 1.6;
  max-width: 56ch;
  margin: 0 auto var(--space-8, 2rem);
  text-shadow: 0 1px 1px var(--color-bg, var(--bg, #f7f6f2));
}

[data-theme="dark"] .hero-bleed p {
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

.hero-bleed .hero-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2, 0.5rem);
  background-color: var(--hero-badge-bg);
  color: var(--hero-badge-color);
  padding: var(--space-1, 0.25rem) var(--space-3, 0.75rem);
  border-radius: var(--radius-full, 9999px);
  font-size: var(--text-xs, 0.85rem);
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: var(--space-4, 1rem);
}

.photo-gallery-section {
  max-width: 1100px;
  margin: var(--space-12, 3rem) auto;
  padding: 0 var(--space-6, 1.5rem);
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-4, 1rem);
  margin-top: var(--space-4, 1rem);
}

.gallery-grid:has(.gallery-item:nth-child(3):last-child) {
  grid-template-columns: repeat(3, 1fr);
}

@media (max-width: 768px) {
  .gallery-grid:has(.gallery-item:nth-child(3):last-child) {
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
}

.gallery-item {
  position: relative;
  display: block;
  width: 100%;
  aspect-ratio: 3 / 2;
  overflow: hidden;
  border-radius: var(--radius-lg, 0.75rem);
  border: 1px solid var(--color-border, var(--border, var(--bor, #d4d1ca)));
  background-color: var(--color-surface, var(--surface, #f9f8f5));
  padding: 0;
  cursor: pointer;
  box-shadow: var(--shadow-sm, 0 1px 2px rgba(0,0,0,0.06));
}

.gallery-item:focus-visible {
  outline: 3px solid var(--color-primary, var(--primary, #01696f));
  outline-offset: 2px;
}

.gallery-picture, 
.gallery-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform var(--transition, 180ms ease);
}

.gallery-item:hover .gallery-img {
  transform: scale(1.04);
}

@media (prefers-reduced-motion: reduce) {
  .gallery-item:hover .gallery-img {
    transform: none;
  }
  .gallery-picture, 
  .gallery-img {
    transition: none;
  }
}

.gallery-caption-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: var(--space-4, 1rem) var(--space-4, 1rem) var(--space-3, 0.75rem);
  background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.75) 100%);
  color: #ffffff;
  text-align: left;
  opacity: 0;
  transition: opacity var(--transition, 180ms ease);
  pointer-events: none;
}

.gallery-item:hover .gallery-caption-overlay,
.gallery-item:focus-within .gallery-caption-overlay {
  opacity: 1;
}

.gallery-caption-text {
  font-size: var(--text-sm, 0.95rem);
  font-weight: 700;
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
}

@media (hover: none) {
  .gallery-caption-overlay {
    opacity: 1;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.65) 100%);
  }
}

.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: rgba(15, 14, 13, 0.96);
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity var(--transition, 180ms ease);
}

.lightbox[aria-hidden="false"] {
  display: flex;
  opacity: 1;
}

.lightbox-content {
  position: relative;
  max-width: 86vw;
  max-height: 82vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1001;
}

.lightbox-figure {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.lightbox-figure picture {
  display: flex;
  justify-content: center;
}

.lightbox-img {
  max-width: 100%;
  max-height: 72vh;
  object-fit: contain;
  border-radius: var(--radius-md, 0.5rem);
  box-shadow: var(--shadow-lg, 0 12px 32px rgba(0,0,0,0.5));
  border: 1px solid rgba(255, 255, 255, 0.12);
}

.lightbox-caption {
  margin-top: var(--space-4, 1rem);
  color: #cdccca;
  font-size: var(--text-base, 1.05rem);
  font-weight: 600;
  text-align: center;
  letter-spacing: 0.02em;
}

.lightbox-close, 
.lightbox-prev, 
.lightbox-next {
  position: absolute;
  background: rgba(255, 255, 255, 0.1);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: var(--radius-full, 9999px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  z-index: 1005;
  transition: background-color var(--transition, 180ms ease), transform var(--transition, 180ms ease);
}

.lightbox-close:hover, 
.lightbox-prev:hover, 
.lightbox-next:hover {
  background: rgba(255, 255, 255, 0.22);
}

.lightbox-close:focus-visible, 
.lightbox-prev:focus-visible, 
.lightbox-next:focus-visible {
  outline: 3px solid var(--color-primary, var(--primary, #4f98a3));
  outline-offset: 2px;
}

.lightbox-close {
  top: var(--space-6, 1.5rem);
  right: var(--space-6, 1.5rem);
  width: 44px;
  height: 44px;
  font-size: 2rem;
  line-height: 1;
}

.lightbox-prev {
  left: var(--space-6, 1.5rem);
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  font-size: 1.5rem;
}

.lightbox-next {
  right: var(--space-6, 1.5rem);
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  font-size: 1.5rem;
}

@media (max-width: 640px) {
  .lightbox-close {
    top: var(--space-4, 1rem);
    right: var(--space-4, 1rem);
    width: 40px;
    height: 40px;
  }
  .lightbox-prev {
    left: var(--space-3, 0.75rem);
    width: 40px;
    height: 40px;
  }
  .lightbox-next {
    right: var(--space-3, 0.75rem);
    width: 40px;
    height: 40px;
  }
}

.photo-credit {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1, 0.25rem);
  font-family: var(--font-body, sans-serif);
  font-size: clamp(10px, 0.7rem, var(--text-xs));
  font-weight: 500;
  padding: 4px 10px;
  border-radius: var(--radius-sm, 0.25rem);
  color: rgba(255, 255, 255, 0.8);
  background-color: rgba(15, 14, 13, 0.65);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 10;
  pointer-events: auto;
}

.photo-credit a {
  color: #ffffff;
  text-decoration: underline;
  text-underline-offset: 2px;
  transition: color var(--transition, 180ms ease);
}

.photo-credit a:hover {
  color: var(--color-primary, var(--primary, #4f98a3));
}

.photo-credit .credit-divider {
  opacity: 0.5;
  margin: 0 2px;
}

.hero-credit {
  position: absolute;
  bottom: var(--space-4, 1rem);
  right: var(--space-4, 1rem);
}

@media (max-width: 640px) {
  .hero-credit {
    bottom: var(--space-2, 0.5rem);
    right: var(--space-2, 0.5rem);
    padding: 3px 6px;
  }
}

.lightbox-credit {
  position: relative;
  margin-top: var(--space-3, 0.75rem);
  background: none;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  color: #bab9b4;
  font-size: var(--text-xs, 0.85rem);
  justify-content: center;
}

.lightbox-credit a {
  color: #ffffff;
  text-decoration: underline;
}

.lightbox-credit a:hover {
  color: var(--color-primary, var(--primary, #4f98a3));
}
</style>
</head>
<body>
<a href="#mainContent" class="skip-link">본문 바로가기</a>
<header class="site-header hero-bleed">
  
  <!-- Background Picture -->
  <picture class="hero-picture">
    <source type="image/avif" srcset="assets/img/jirisan/hero-640.avif 640w, assets/img/jirisan/hero-1024.avif 1024w, assets/img/jirisan/hero-1600.avif 1600w, assets/img/jirisan/hero-2400.avif 2400w" sizes="100vw">
    <source type="image/webp" srcset="assets/img/jirisan/hero-640.webp 640w, assets/img/jirisan/hero-1024.webp 1024w, assets/img/jirisan/hero-1600.webp 1600w, assets/img/jirisan/hero-2400.webp 2400w" sizes="100vw">
    <img src="assets/img/jirisan/hero-1600.jpg" srcset="assets/img/jirisan/hero-640.jpg 640w, assets/img/jirisan/hero-1024.jpg 1024w, assets/img/jirisan/hero-1600.jpg 1600w, assets/img/jirisan/hero-2400.jpg 2400w" sizes="100vw" alt="지리산 정상과 웅장한 산세가 어우러진 대자연 풍경 / Majestic natural landscape of Jirisan mountain peaks and ridges" class="hero-img">
  </picture>
  <div class="hero-overlay"></div>

    <div class="hero-content">
    <div class="hero-badge">🏔 지리산 플레이북</div>
    <h1 style="color: var(--hero-text); font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 800; line-height: 1.15; margin-bottom: var(--space-4);">지리산 등산 플레이북</h1>
    <p style="color: var(--hero-text-muted); font-size: var(--text-base); line-height: 1.6; max-width: 56ch; margin: 0 auto var(--space-8);">
      대한민국 최고의 명산 중 하나인 지리산 국립공원 가이드. 초급 고도 프로파일, 고급 고도 프로파일 코스의 상세 경로, 실사 지도 및 팁을 제공합니다.
    </p>

<!-- Lightbox Dialog Overlay -->
<div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="이미지 크게 보기" aria-hidden="true" tabindex="-1">
  <button class="lightbox-close" aria-label="갤러리 닫기">&times;</button>
  <button class="lightbox-prev" aria-label="이전 이미지">&#10094;</button>
  <button class="lightbox-next" aria-label="다음 이미지">&#10095;</button>
  <div class="lightbox-content">
    <figure class="lightbox-figure">
      <figcaption class="lightbox-caption"></figcaption>
    </figure>
    <div class="photo-credit lightbox-credit"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const galleryItems = document.querySelectorAll('.gallery-item');
  const lightbox = document.getElementById('lightbox');
  if (!lightbox || galleryItems.length === 0) return;
  
  const closeBtn = lightbox.querySelector('.lightbox-close');
  const prevBtn = lightbox.querySelector('.lightbox-prev');
  const nextBtn = lightbox.querySelector('.lightbox-next');
  const figureContainer = lightbox.querySelector('.lightbox-figure');
  const captionEl = lightbox.querySelector('.lightbox-caption');
  const creditEl = lightbox.querySelector('.lightbox-credit');
  
  let currentIndex = -1;
  let lastActiveElement = null;
  
  const openLightbox = (index) => {
    currentIndex = index;
    lastActiveElement = document.activeElement;
    
    const item = galleryItems[currentIndex];
    const sourcePicture = item.querySelector('picture');
    const captionText = item.querySelector('.gallery-caption-text')?.textContent || '';
    
    const existingPic = figureContainer.querySelector('picture');
    if (existingPic) existingPic.remove();
    
    const clonedPic = sourcePicture.cloneNode(true);
    const img = clonedPic.querySelector('img');
    img.className = 'lightbox-img';
    img.removeAttribute('loading');
    img.removeAttribute('decoding');
    
    figureContainer.insertBefore(clonedPic, captionEl);
    captionEl.textContent = captionText;
    
    const creditData = item.getAttribute('data-credit') || '';
    if (creditData && creditEl) {
      creditEl.innerHTML = creditData;
      creditEl.style.display = 'block';
    } else if (creditEl) {
      creditEl.style.display = 'none';
    }
    
    lightbox.setAttribute('aria-hidden', 'false');
    lightbox.focus();
    document.body.style.overflow = 'hidden';
  };
  
  const closeLightbox = () => {
    lightbox.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    if (lastActiveElement) lastActiveElement.focus();
  };
  
  const showNext = () => {
    let nextIndex = currentIndex + 1;
    if (nextIndex >= galleryItems.length) nextIndex = 0;
    openLightbox(nextIndex);
  };
  
  const showPrev = () => {
    let prevIndex = currentIndex - 1;
    if (prevIndex < 0) prevIndex = galleryItems.length - 1;
    openLightbox(prevIndex);
  };
  
  galleryItems.forEach((item, idx) => {
    item.addEventListener('click', () => openLightbox(idx));
  });
  
  closeBtn.addEventListener('click', closeLightbox);
  nextBtn.addEventListener('click', showNext);
  prevBtn.addEventListener('click', showPrev);
  
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox || e.target.classList.contains('lightbox-content')) {
      closeLightbox();
    }
  });
  
  lightbox.addEventListener('keydown', (e) => {
    if (lightbox.getAttribute('aria-hidden') === 'true') return;
    
    if (e.key === 'Escape') {
      closeLightbox();
    } else if (e.key === 'ArrowRight') {
      showNext();
    } else if (e.key === 'ArrowLeft') {
      showPrev();
    } else if (e.key === 'Tab') {
      const focusableElements = lightbox.querySelectorAll('button');
      const firstFocus = focusableElements[0];
      const lastFocus = focusableElements[focusableElements.length - 1];
      
      if (e.shiftKey) {
        if (document.activeElement === firstFocus) {
          lastFocus.focus();
          e.preventDefault();
        }
      } else {
        if (document.activeElement === lastFocus) {
          firstFocus.focus();
          e.preventDefault();
        }
      }
    }
  });
});
</script>

<script>
// Unified course switcher override for rebranding compatibility
(function() {
  const switcher = function(lv, btn) {
    document.querySelectorAll('.course-btn').forEach(b => {
      b.classList.remove('active');
    });
    if (btn) {
      btn.classList.add('active');
    } else {
      const targetBtn = document.querySelector('.course-btn.' + lv) || document.querySelector('.course-btn[onclick*="' + lv + '"]');
      if (targetBtn) targetBtn.classList.add('active');
    }
    document.querySelectorAll('.course-panel, .panel').forEach(p => {
      p.classList.remove('active');
    });
    const panel = document.getElementById('panel-' + lv) || 
                  document.getElementById('course-' + lv) || 
                  document.getElementById(lv) ||
                  document.querySelector('.course-panel.' + lv) ||
                  document.querySelector('.panel.' + lv);
    if (panel) {
      panel.classList.add('active');
      setTimeout(() => {
        panel.querySelectorAll('.diff-bar-fill').forEach(b => {
          const w = b.style.width;
          if (w && w !== '0%') {
            b.style.width = '0%';
            requestAnimationFrame(() => requestAnimationFrame(() => { b.style.width = w; }));
          }
        });
      }, 50);
    }
  };
  window.selectDifficulty = window.switchLevel = window.selectLevel = window.selectCourse = window.selC = switcher;
})();
</script>
